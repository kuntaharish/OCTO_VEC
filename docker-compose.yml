# OCTO VEC — SonarQube Code Analysis Server
#
# First-time setup:
#   1. docker compose up -d
#   2. Wait ~60s, open http://localhost:9000
#   3. Login: admin / admin → change password when prompted
#   4. My Account → Security → Generate Token (type: "vec-scanner")
#   5. Copy token to .env as SONAR_TOKEN=squ_xxxxx
#   6. Pull scanner image: docker pull sonarsource/sonar-scanner-cli:latest

services:
  sonarqube:
    image: sonarqube:community
    container_name: vec-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - vec-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  vec-net:
    driver: bridge
    name: vec-net
